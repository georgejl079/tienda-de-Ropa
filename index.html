<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA Boutique | Luxury & Style</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #000000;
            --accent: #d4a373;
            --bg: #ffffff;
            --surface: #f4f4f4;
            --text-main: #1a1a1a;
            --text-dim: #777777;
            --wa-green: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); overflow-x: hidden; }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

        /* --- BANNER ANUNCIOS --- */
        .announcement-bar {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 10px 5%;
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: #fff; z-index: 1000; border-bottom: 1px solid #eee;
        }
        .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: -1px; cursor: pointer; }
        .cart-trigger { position: relative; font-size: 1.3rem; cursor: pointer; }
        .cart-badge { position: absolute; top: -5px; right: -10px; background: var(--accent); color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 50%; }

        /* --- BUSCADOR --- */
        .search-container { padding: 15px 5%; background: #fff; }
        .search-box {
            background: var(--surface);
            display: flex; align-items: center;
            padding: 12px 18px;
            border-radius: 30px;
        }
        .search-box i { color: var(--text-dim); margin-right: 12px; }
        .search-box input {
            border: none; background: transparent; outline: none;
            width: 100%; font-size: 0.95rem; font-family: 'Inter', sans-serif;
        }

        /* --- HERO --- */
        .hero {
            height: 55vh;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070') center/cover;
            display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .hero h1 { font-size: 2.8rem; line-height: 1.1; }

        /* --- MOSAICO CATEGORÍAS --- */
        .cat-section { padding: 40px 5%; text-align: center; }
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }
        .cat-item { position: relative; height: 450px; overflow: hidden; border-radius: 10px; cursor: pointer; }
        .cat-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .cat-item:hover img { transform: scale(1.08); }
        .cat-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.25);
            display: flex; align-items: center; justify-content: center; color: white;
        }
        .cat-overlay h3 { font-size: 1.6rem; border-bottom: 2px solid #fff; padding-bottom: 5px; }

        /* --- FILTROS (CHIPS) --- */
        .filter-nav { display: flex; gap: 12px; padding: 20px 5%; overflow-x: auto; scrollbar-width: none; }
        .filter-nav::-webkit-scrollbar { display: none; }
        .filter-btn {
            flex: 0 0 auto; padding: 10px 22px; border: 1px solid #eee; background: white;
            border-radius: 30px; font-weight: 600; font-size: 0.85rem; cursor: pointer;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- GRID PRODUCTOS --- */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 0 5% 100px; }
        .product-card { text-align: center; cursor: pointer; }
        .p-img-box { aspect-ratio: 3/4; overflow: hidden; border-radius: 8px; margin-bottom: 12px; }
        .p-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price { font-weight: 700; color: var(--accent); font-size: 1.1rem; }

        /* --- MODAL (BOTTOM SHEET MÓVIL) --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; z-index: 5000; }
        .modal.active { display: flex; }
        .modal-content {
            background: white; width: 100%; border-radius: 25px 25px 0 0;
            max-height: 90vh; overflow-y: auto; position: relative;
            animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 1.8rem; z-index: 10; cursor: pointer; }
        .modal-gallery { height: 400px; }
        .modal-gallery img { width: 100%; height: 100%; object-fit: cover; }
        .modal-details { padding: 30px; display: flex; flex-direction: column; gap: 20px; }

        /* --- WHATSAPP FLOTANTE --- */
        .wa-float {
            position: fixed; bottom: 25px; right: 20px; background: var(--wa-green); color: white;
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 4000; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* --- CARRITO --- */
        .cart-sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px;
            height: 100vh; background: white; z-index: 6000; transition: 0.4s ease;
            padding: 30px; display: flex; flex-direction: column;
        }
        .cart-sidebar.active { right: 0; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .cat-grid { grid-template-columns: 1fr; }
            .cat-item { height: 320px; }
            .hero h1 { font-size: 2.3rem; }
        }
        @media (min-width: 769px) {
            .products-grid { grid-template-columns: repeat(4, 1fr); }
            .modal { align-items: center; padding: 20px; }
            .modal-content { max-width: 900px; display: grid; grid-template-columns: 1.1fr 0.9fr; border-radius: 15px; overflow: hidden; }
            .modal-gallery { height: 100%; }
        }
    </style>
</head>
<body>

    <div class="announcement-bar">
        <p>🚚 ENVÍOS GRATIS A PARTIR DE 500 Bs.</p>
    </div>

    <nav>
        <div class="logo" onclick="location.reload()">AURA</div>
        <div class="cart-trigger" onclick="toggleCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge" id="cart-count">0</span>
        </div>
    </nav>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="main-search" placeholder="¿Qué estás buscando hoy?" onkeyup="searchProducts()">
        </div>
    </div>

    <header class="hero">
        <div>
            <p style="letter-spacing: 4px; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px;">Colección 2026</p>
            <h1>Elegancia en cada<br>Detalle</h1>
        </div>
    </header>

    <section class="cat-section">
        <h2>Categorías Destacadas</h2>
        <div class="cat-grid">
            <div class="cat-item" onclick="filterBy('vestidos')">
                <img src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=800">
                <div class="cat-overlay"><h3>Vestidos</h3></div>
            </div>
            <div class="cat-item" onclick="filterBy('conjuntos')">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=800">
                <div class="cat-overlay"><h3>Conjuntos</h3></div>
            </div>
            <div class="cat-item" onclick="filterBy('accesorios')">
                <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=800">
                <div class="cat-overlay"><h3>Accesorios</h3></div>
            </div>
        </div>
    </section>

    <section id="tienda">
        <div class="filter-nav">
            <button class="filter-btn active" onclick="filterBy('all')">Todos</button>
            <button class="filter-btn" onclick="filterBy('vestidos')">Vestidos</button>
            <button class="filter-btn" onclick="filterBy('conjuntos')">Conjuntos</button>
            <button class="filter-btn" onclick="filterBy('accesorios')">Accesorios</button>
        </div>
        <div class="products-grid" id="product-grid"></div>
    </section>

    <div class="modal" id="product-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-gallery"><img id="m-img" src=""></div>
            <div class="modal-details">
                <h2 id="m-name"></h2>
                <p id="m-price" style="font-size: 1.5rem; color: var(--accent); font-weight: 700;"></p>
                <p style="color: var(--text-dim); font-size: 0.9rem;">Pieza exclusiva de alta costura, diseñada para resaltar tu figura con elegancia y confort.</p>
                
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="filter-btn" onclick="selectSize(this)">S</button>
                    <button class="filter-btn" onclick="selectSize(this)">M</button>
                    <button class="filter-btn" onclick="selectSize(this)">L</button>
                </div>

                <button class="filter-btn active" style="width:100%; padding: 18px; border-radius: 8px; font-size: 1rem; margin-top: 10px;" onclick="addToCart()">
                    Añadir a la Bolsa
                </button>
            </div>
        </div>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-size: 1.4rem;">Tu Bolsa</h2>
            <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; font-size: 1.2rem;"></i>
        </div>
        <div id="cart-list" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="border-top: 1px solid #eee; padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-weight:700; font-size: 1.2rem; margin-bottom:25px;">
                <span>Total:</span>
                <span id="cart-total">Bs. 0</span>
            </div>
            <button class="filter-btn active" style="width:100%; padding:18px; background:var(--wa-green); border:none;" onclick="checkoutWA()">
                Finalizar por WhatsApp
            </button>
        </div>
    </div>

    <a href="https://wa.me/59175179990" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        const products = [
            { id: 1, name: 'Vestido Satin Esmeralda', price: 450, cat: 'vestidos', img: 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=800' },
            { id: 2, name: 'Conjunto Lino Natural', price: 520, cat: 'conjuntos', img: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=800' },
            { id: 3, name: 'Blusa Seda Perla', price: 280, cat: 'conjuntos', img: 'https://images.unsplash.com/photo-1551163943-3f6a855d1153?w=800' },
            { id: 4, name: 'Cartera Gold Clutch', price: 220, cat: 'accesorios', img: 'https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=800' },
            { id: 5, name: 'Vestido Noche Negro', price: 600, cat: 'vestidos', img: 'https://images.unsplash.com/photo-1539008835279-43469393d161?w=800' }
        ];

        let cart = JSON.parse(localStorage.getItem('aura_cart')) || [];
        let curP = null, selSize = null;

        function render(data = products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card" onclick="openModal(${p.id})">
                        <div class="p-img-box"><img src="${p.img}"></div>
                        <h4>${p.name}</h4>
                        <p class="price">Bs. ${p.price}</p>
                    </div>`;
            });
        }

        function searchProducts() {
            const term = document.getElementById('main-search').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(term) || p.cat.toLowerCase().includes(term));
            render(filtered);
            if(term !== "") document.getElementById('tienda').scrollIntoView({ behavior: 'smooth' });
        }

        function filterBy(cat) {
            const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
            render(filtered);
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === cat || (cat === 'all' && btn.innerText === 'Todos'));
            });
            document.getElementById('tienda').scrollIntoView({ behavior: 'smooth' });
        }

        function openModal(id) {
            curP = products.find(p => p.id === id);
            selSize = null;
            document.getElementById('m-name').innerText = curP.name;
            document.getElementById('m-price').innerText = `Bs. ${curP.price}`;
            document.getElementById('m-img').src = curP.img;
            document.querySelectorAll('#product-modal .filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('product-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('product-modal').classList.remove('active'); document.body.style.overflow = 'auto'; }

        function selectSize(btn) {
            document.querySelectorAll('#product-modal .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); selSize = btn.innerText;
        }

        function addToCart() {
            if(!selSize) return alert("Por favor selecciona una talla");
            cart.push({...curP, size: selSize});
            updateCart(); saveCart(); closeModal(); toggleCart(true);
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            let total = 0; list.innerHTML = '';
            cart.forEach((p, i) => {
                total += p.price;
                list.innerHTML += `
                    <div style="display:flex; gap:15px; margin-bottom:20px; align-items:center;">
                        <img src="${p.img}" style="width:60px; height:80px; object-fit:cover; border-radius:5px;">
                        <div style="flex-grow:1;">
                            <b style="font-size:0.9rem;">${p.name}</b><br>
                            <span style="font-size:0.8rem; color:gray;">Talla: ${p.size}</span><br>
                            <b style="color:var(--accent);">Bs. ${p.price}</b>
                        </div>
                        <i class="fas fa-trash" onclick="removeFromCart(${i})" style="color:#eee; cursor:pointer;"></i>
                    </div>`;
            });
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = `Bs. ${total}`;
        }

        function removeFromCart(i) { cart.splice(i, 1); updateCart(); saveCart(); }
        function toggleCart(o = false) { document.getElementById('cart-sidebar').classList[o?'add':'toggle']('active'); }
        function saveCart() { localStorage.setItem('aura_cart', JSON.stringify(cart)); }

        function checkoutWA() {
            if(!cart.length) return alert("Tu bolsa está vacía");
            let msg = "🛍️ *NUEVO PEDIDO - AURA*\n\n";
            cart.forEach(p => msg += `• ${p.name} (${p.size}) - Bs. ${p.price}\n`);
            msg += `\n*Total: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/59175179990?text=${encodeURIComponent(msg)}`);
        }

        render(); updateCart();
    </script>
</body>
</html>
